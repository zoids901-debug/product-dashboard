name: Daily Data Sync

on:
  schedule:
    # 매일 KST 23:00 = UTC 14:00
    - cron: '0 14 * * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright requests
          python -m playwright install --with-deps chromium

      - name: Run sync
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_REPO: zoids901-debug/product-dashboard
          OKPOS_ID: ${{ secrets.OKPOS_ID }}
          OKPOS_PW: ${{ secrets.OKPOS_PW }}
          TOSS_ID: ${{ secrets.TOSS_ID }}
          TOSS_PW: ${{ secrets.TOSS_PW }}
        run: python scripts/actions_sync.py

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const date = new Date().toISOString().slice(0,10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Daily sync failed (' + date + ')',
              body: 'Workflow failed. Run: ' + context.payload.repository.html_url + '/actions/runs/' + context.runId,
              labels: ['automation-failure']
            });
